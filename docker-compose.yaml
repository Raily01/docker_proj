version: "3.9"

services:

  postgres_db:
    build: ./database

    container_name: postgres_container

    restart: always

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app_network


  python_backend:
    build: ./backend

    container_name: python_container

    restart: always

    depends_on:
      - postgres_db

    volumes:
      - ./logs:/app/logs

    networks:
      - app_network

    ports:
      - "5000:5000"


  nginx_server:
    build: ./nginx

    container_name: nginx_container

    restart: always

    depends_on:
      - python_backend

    ports:
      - "80:80"

    networks:
      - app_network


volumes:

  postgres_data:


networks:

  app_network:
    driver: bridge